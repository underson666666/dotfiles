# untrusted: 全てのコマンドで承認を要求
# on-failure: コマンド失敗時のみ承認を要求
# on-request: モデルが明示的に要求した場合のみ要求
# never: 承認を要求しない(自動実行)
approval_policy = "untrusted"

# read-only: ファイル読み取り、編集、コマンド実行に承認が必要
# workspace-write: ワークスペース内の読み書きとコマンド実行が可能
# danger-full-access: 全ディスクとネットワークへのアクセスが可能(危険)
sandbox_mode = "read-only"

# disabled/cached/live
web_search = "live"
model = "gpt-5.4"
model_reasoning_effort = "medium"

[sandbox_workspace_write]
network_access = false

[shell_environment_policy]
inherit = "core"

[tools]
view_image = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "run-state", "approval-mode", "context-remaining", "five-hour-limit", "task-progress"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4
